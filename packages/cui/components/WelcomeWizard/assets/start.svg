<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Rocket / arrow pointing up-right -->
  <g transform="translate(200, 100)">
    <!-- Rocket body -->
    <path d="M40 80 L60 20 L80 80 Z" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Rocket window -->
    <circle cx="60" cy="52" r="8" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Flame trails -->
    <path d="M48 82 L52 100 L60 90 L68 100 L72 82" fill="currentColor" fill-opacity="0.15"/>
    <!-- Motion lines -->
    <line x1="30" y1="70" x2="30" y2="90" stroke="currentColor" stroke-opacity="0.1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="75" x2="20" y2="88" stroke="currentColor" stroke-opacity="0.07" stroke-width="1" stroke-linecap="round"/>
    <line x1="90" y1="70" x2="90" y2="90" stroke="currentColor" stroke-opacity="0.1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="75" x2="100" y2="88" stroke="currentColor" stroke-opacity="0.07" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- Gear icon (left) -->
  <g transform="translate(100, 180)">
    <circle cx="24" cy="24" r="16" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.5" fill="currentColor" fill-opacity="0.05"/>
    <circle cx="24" cy="24" r="6" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>
    <!-- Gear teeth -->
    <line x1="24" y1="6" x2="24" y2="12" stroke="currentColor" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="36" x2="24" y2="42" stroke="currentColor" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="24" x2="12" y2="24" stroke="currentColor" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>
    <line x1="36" y1="24" x2="42" y2="24" stroke="currentColor" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Checkboxes (right) -->
  <g transform="translate(320, 170)">
    <!-- Checkbox 1 - checked -->
    <rect x="0" y="0" width="22" height="22" rx="5" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M6 11 L10 15 L16 7" stroke="currentColor" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="30" y="4" width="60" height="6" rx="3" fill="currentColor" fill-opacity="0.1"/>
    <rect x="30" y="12" width="40" height="5" rx="2.5" fill="currentColor" fill-opacity="0.06"/>
    <!-- Checkbox 2 - checked -->
    <rect x="0" y="34" width="22" height="22" rx="5" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M6 45 L10 49 L16 41" stroke="currentColor" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="30" y="38" width="50" height="6" rx="3" fill="currentColor" fill-opacity="0.1"/>
    <rect x="30" y="46" width="70" height="5" rx="2.5" fill="currentColor" fill-opacity="0.06"/>
    <!-- Checkbox 3 - unchecked -->
    <rect x="0" y="68" width="22" height="22" rx="5" fill="none" stroke="currentColor" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="30" y="72" width="55" height="6" rx="3" fill="currentColor" fill-opacity="0.08"/>
    <rect x="30" y="80" width="35" height="5" rx="2.5" fill="currentColor" fill-opacity="0.05"/>
  </g>
  <!-- Connecting curved line -->
  <path d="M148 204 C 180 190, 280 190, 320 192" stroke="currentColor" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Sparkles -->
  <circle cx="180" cy="130" r="2.5" fill="currentColor" fill-opacity="0.12"/>
  <circle cx="340" cy="140" r="2" fill="currentColor" fill-opacity="0.1"/>
  <circle cx="150" cy="260" r="3" fill="currentColor" fill-opacity="0.08"/>
  <circle cx="380" cy="260" r="2.5" fill="currentColor" fill-opacity="0.06"/>
</svg>
