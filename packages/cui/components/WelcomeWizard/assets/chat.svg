<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Left chat bubble (user) -->
  <rect x="80" y="90" width="160" height="48" rx="12" fill="currentColor" fill-opacity="0.1"/>
  <rect x="96" y="106" width="80" height="6" rx="3" fill="currentColor" fill-opacity="0.2"/>
  <rect x="96" y="118" width="56" height="6" rx="3" fill="currentColor" fill-opacity="0.12"/>
  <!-- Right chat bubble (assistant) -->
  <rect x="240" y="150" width="180" height="64" rx="12" fill="currentColor" fill-opacity="0.08"/>
  <rect x="256" y="166" width="100" height="6" rx="3" fill="currentColor" fill-opacity="0.15"/>
  <rect x="256" y="178" width="140" height="6" rx="3" fill="currentColor" fill-opacity="0.12"/>
  <rect x="256" y="190" width="72" height="6" rx="3" fill="currentColor" fill-opacity="0.08"/>
  <!-- Code block inside assistant bubble -->
  <rect x="256" y="200" width="60" height="4" rx="2" fill="currentColor" fill-opacity="0.18"/>
  <!-- Left smaller bubble -->
  <rect x="100" y="230" width="140" height="40" rx="10" fill="currentColor" fill-opacity="0.06"/>
  <rect x="116" y="244" width="60" height="6" rx="3" fill="currentColor" fill-opacity="0.15"/>
  <rect x="116" y="256" width="100" height="5" rx="2.5" fill="currentColor" fill-opacity="0.1"/>
  <!-- Connection dots -->
  <circle cx="220" cy="130" r="3" fill="currentColor" fill-opacity="0.15"/>
  <circle cx="248" cy="145" r="2.5" fill="currentColor" fill-opacity="0.12"/>
  <!-- Connecting line -->
  <path d="M222 132 C 230 138, 240 140, 248 143" stroke="currentColor" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- Sparkle indicator -->
  <circle cx="430" y="166" r="6" fill="currentColor" fill-opacity="0.12"/>
  <path d="M430 160 L430 172 M424 166 L436 166" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- User avatar -->
  <circle cx="60" cy="114" r="14" fill="currentColor" fill-opacity="0.08"/>
  <circle cx="60" cy="110" r="5" fill="currentColor" fill-opacity="0.15"/>
  <path d="M50 124 C50 118, 70 118, 70 124" fill="currentColor" fill-opacity="0.1"/>
  <!-- Bot avatar -->
  <circle cx="432" cy="182" r="14" fill="currentColor" fill-opacity="0.08"/>
  <rect x="425" y="176" width="14" height="10" rx="3" fill="currentColor" fill-opacity="0.15"/>
  <circle cx="429" cy="180" r="1.5" fill="currentColor" fill-opacity="0.3"/>
  <circle cx="435" cy="180" r="1.5" fill="currentColor" fill-opacity="0.3"/>
</svg>
